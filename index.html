<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Teleportal – GLB Auto‑Scale</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; font-family: 'Segoe UI', Arial, sans-serif; }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            pointer-events: none;
            z-index: 10;
            opacity: 0.9;
            display: none;
        }
        #teleportFlash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            transition: background-color 0.1s;
        }
        #menuScreen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-left: 10vw;
            background:
                radial-gradient(circle at 80% 90%, rgba(200, 90, 10, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 10% 10%, rgba(30, 140, 255, 0.08) 0%, transparent 40%),
                #0a0b0f;
            color: white;
            z-index: 2000;
            overflow: hidden;
            min-height: 100vh;
        }
        #menuScreen::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 4px;
            opacity: 0.1;
            pointer-events: none;
        }
        .menu-container {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 2;
        }
        .menu-logo {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 2px 16px rgba(0,0,0,0.95);
            margin-bottom: 16px;
        }
        .logo-icon svg {
            display: block;
            width: 40px;
            height: 48px;
            filter: drop-shadow(0 0 12px rgba(0, 210, 255, 0.3));
        }
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .menu-item {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.85);
            padding: 4px 12px;
            margin-left: -12px;
            cursor: pointer;
            text-shadow: 0 2px 12px rgba(0,0,0,0.9);
            border-radius: 2px;
            transition: all 0.1s ease;
        }
        .menu-item:hover {
            color: #ffffff;
            background: rgba(255,255,255,0.04);
        }
        .menu-item.active, .menu-item.active:hover {
            background: rgba(255,255,255,0.12);
            color: #ffffff;
        }
        .menu-footer {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            font-weight: 400;
            color: rgba(255,255,255,0.7);
            text-shadow: 0 2px 12px rgba(0,0,0,0.9);
            cursor: default;
        }
        .footer-icon {
            font-size: 14px;
            display: inline-block;
        }
        #loadingIndicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 20px;
            z-index: 3000;
            pointer-events: none;
            display: none;
        }
        #menuPreview, #menuLabel { display: none !important; }
    </style>
</head>
<body>
    <div id="menuScreen">
        <div class="menu-container">
            <div class="menu-logo">
                TELEPORTAL
                <span class="logo-icon">
                    <svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 40 5 C 65 5, 75 25, 75 45 C 75 70, 65 85, 40 95 C 15 105, 5 85, 5 60 C 5 35, 15 15, 40 5 Z" fill="none" stroke="#00d2ff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M 70 45 C 72 55, 68 70, 60 78" fill="none" stroke="#00d2ff" stroke-width="6" stroke-linecap="round" />
                        <path d="M 10 60 C 12 50, 15 40, 22 33" fill="none" stroke="#00d2ff" stroke-width="6" stroke-linecap="round" />
                    </svg>
                </span>
            </div>
            <div class="menu-list">
                <div id="playButton" class="menu-item active">SINGLE PLAYER</div>
                <div class="menu-item">CO-OP</div>
                <div class="menu-item">COMMUNITY CHAMBERS</div>
                <div class="menu-item">OPTIONS</div>
                <div class="menu-item">EXTRAS</div>
                <div class="menu-item" onclick="location.reload()">EXIT</div>
            </div>
            <div class="menu-footer">
                <span class="footer-icon">⚙️</span> Robot Enhancement
            </div>
        </div>
    </div>

    <div id="crosshair">
        <svg viewBox="0 0 100 100" width="100%" height="100%">
            <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" />
            <path d="M 22 50 A 28 28 0 0 1 50 22" fill="none" stroke="#00aaff" stroke-width="3" stroke-linecap="round" />
            <path d="M 78 50 A 28 28 0 0 0 50 22" fill="none" stroke="#ff6600" stroke-width="3" stroke-linecap="round" />
            <circle cx="50" cy="50" r="3" fill="white" />
        </svg>
    </div>
    <div id="teleportFlash"></div>
    <div id="loadingIndicator">Loading assets…</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as CANNON from 'cannon-es';

        // ============================================================
        // AUTO-SCALING HELPERS
        // ============================================================
        function scaleModelToTarget(model, targetSize) {
            // Uniformly scale the model so its longest axis equals targetSize
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            if (maxDim > 0.001) {
                const scaleFactor = targetSize / maxDim;
                model.scale.set(scaleFactor, scaleFactor, scaleFactor);
                console.log(`Auto-scaled model from ${maxDim.toFixed(2)} to ${targetSize} (factor ${scaleFactor.toFixed(3)})`);
            } else {
                console.warn('Model has zero size, cannot auto-scale.');
            }
        }

        function getModelHalfExtents(model) {
            // Returns the half-extents of the model's bounding box (after scaling)
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            return size.clone().multiplyScalar(0.5);
        }

        // ============================================================
        // ASSET LOADER with fallback + auto-scale
        // ============================================================
        const ASSET_PATH = './assets/';
        const loader = new GLTFLoader();
        let assets = {
            environment: null,
            cube: null,
            gun: null
        };
        let assetsLoaded = 0;
        const totalAssets = 3;
        let allAssetsAttempted = false;
        const loadingIndicator = document.getElementById('loadingIndicator');

        function assetLoaded() {
            assetsLoaded++;
            if (assetsLoaded >= totalAssets) {
                allAssetsAttempted = true;
                loadingIndicator.style.display = 'none';
                console.log('All assets processed.');
            }
        }

        loadingIndicator.style.display = 'block';

        // ---- Environment (target size: 20 units to match chamber) ----
        loader.load(
            `${ASSET_PATH}environment.glb`,
            (gltf) => {
                assets.environment = gltf.scene;
                // Auto-scale to 20 units on longest axis
                scaleModelToTarget(assets.environment, 20);
                console.log('Environment loaded and auto-scaled.');
                assetLoaded();
            },
            undefined,
            (err) => {
                console.warn('Environment GLB not found, using procedural fallback.', err);
                assets.environment = null;
                assetLoaded();
            }
        );

        // ---- Cube (target size: 1.1 units to match game's cube size) ----
        loader.load(
            `${ASSET_PATH}cube.glb`,
            (gltf) => {
                assets.cube = gltf.scene;
                scaleModelToTarget(assets.cube, 1.1);
                console.log('Cube loaded and auto-scaled.');
                assetLoaded();
            },
            undefined,
            (err) => {
                console.warn('Cube GLB not found, using procedural fallback.', err);
                assets.cube = null;
                assetLoaded();
            }
        );

        // ---- Gun (target size: 0.8 units to match procedural gun length) ----
        loader.load(
            `${ASSET_PATH}gun.glb`,
            (gltf) => {
                assets.gun = gltf.scene;
                scaleModelToTarget(assets.gun, 0.8);
                console.log('Gun loaded and auto-scaled.');
                assetLoaded();
            },
            undefined,
            (err) => {
                console.warn('Gun GLB not found, using procedural fallback.', err);
                assets.gun = null;
                assetLoaded();
            }
        );

        // ============================================================
        // SCENE SETUP
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a14);
        scene.fog = new THREE.Fog(0x0a0a14, 14, 45);
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.01, 500);
        camera.position.set(0, 1.8, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 0.9;
        document.body.appendChild(renderer.domElement);

        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        // ============================================================
        // PORTAL SYSTEM (unchanged)
        // ============================================================
        class PortalSystem {
            constructor(scene, renderer, camera) {
                this.scene = scene;
                this.renderer = renderer;
                this.camera = camera;
                this.portals = new Map();
                this.maxPortalDepth = 3;
                this.recursionDepth = 0;
            }

            createOrUpdatePortal(id, position, normal, color) {
                let portal = this.portals.get(id);
                if (!portal) {
                    const renderTarget = new THREE.WebGLRenderTarget(
                        window.innerWidth,
                        window.innerHeight,
                        {
                            minFilter: THREE.LinearFilter,
                            magFilter: THREE.LinearFilter,
                            format: THREE.RGBAFormat,
                            stencilBuffer: false
                        }
                    );
                    renderTarget.texture.encoding = THREE.sRGBEncoding;

                    portal = {
                        id,
                        position: new THREE.Vector3(),
                        normal: new THREE.Vector3(),
                        color,
                        linkedPortalId: null,
                        renderTarget,
                        camera: new THREE.PerspectiveCamera(
                            this.camera.fov,
                            this.camera.aspect,
                            0.01,
                            500
                        ),
                        visible: true
                    };
                    this.portals.set(id, portal);
                }
                
                portal.position.copy(position);
                portal.normal.copy(normal).normalize();
                portal.color = color;
                return portal;
            }

            linkPortals(portalId1, portalId2) {
                const portal1 = this.portals.get(portalId1);
                const portal2 = this.portals.get(portalId2);
                if (portal1 && portal2) {
                    portal1.linkedPortalId = portalId2;
                    portal2.linkedPortalId = portalId1;
                }
            }

            renderPortalView(portalId) {
                const portal = this.portals.get(portalId);
                if (!portal || !portal.linkedPortalId) return;

                const linkedPortal = this.portals.get(portal.linkedPortalId);
                if (!linkedPortal) return;

                if (this.recursionDepth >= this.maxPortalDepth) return;
                this.recursionDepth++;

                const playerPos = this.camera.position.clone();
                const fromPortal = playerPos.clone().sub(portal.position);
                
                const portalNormal = portal.normal.clone();
                const upVec = new THREE.Vector3(0, 1, 0);
                const rightVec = new THREE.Vector3().crossVectors(upVec, portalNormal).normalize();
                if (rightVec.length() < 0.01) {
                    rightVec.set(1, 0, 0);
                }
                const portalUp = new THREE.Vector3().crossVectors(portalNormal, rightVec).normalize();
                
                const localRight = fromPortal.dot(rightVec);
                const localUp = fromPortal.dot(portalUp);
                
                const linkedNormal = linkedPortal.normal.clone();
                const linkedRight = new THREE.Vector3().crossVectors(upVec, linkedNormal).normalize();
                if (linkedRight.length() < 0.01) {
                    linkedRight.set(1, 0, 0);
                }
                const linkedUp = new THREE.Vector3().crossVectors(linkedNormal, linkedRight).normalize();
                
                const cameraPos = linkedPortal.position.clone()
                    .add(linkedRight.clone().multiplyScalar(localRight))
                    .add(linkedUp.clone().multiplyScalar(localUp))
                    .add(linkedNormal.clone().multiplyScalar(0.05));
                
                portal.camera.position.copy(cameraPos);
                
                const lookTarget = linkedPortal.position.clone()
                    .add(linkedNormal.clone().multiplyScalar(10))
                    .add(linkedRight.clone().multiplyScalar(localRight))
                    .add(linkedUp.clone().multiplyScalar(localUp));
                
                portal.camera.lookAt(lookTarget);

                const portalVisibility = new Map();
                this.portals.forEach((p, id) => {
                    portalVisibility.set(id, p.visible);
                    p.visible = false;
                });

                this.renderer.setRenderTarget(portal.renderTarget);
                this.renderer.setClearColor(new THREE.Color(0x0a0a14));
                this.renderer.clear();
                this.renderer.render(this.scene, portal.camera);

                portalVisibility.forEach((visible, id) => {
                    const p = this.portals.get(id);
                    if (p) p.visible = visible;
                });

                this.renderer.setRenderTarget(null);
                this.recursionDepth--;
            }

            renderAllPortals() {
                this.recursionDepth = 0;
                this.portals.forEach((portal, id) => {
                    if (portal.linkedPortalId) {
                        this.renderPortalView(id);
                    }
                });
            }

            getPortalTexture(portalId) {
                const portal = this.portals.get(portalId);
                return portal ? portal.renderTarget.texture : null;
            }

            updateSize(width, height) {
                this.portals.forEach(portal => {
                    portal.renderTarget.setSize(width, height);
                    portal.camera.aspect = width / height;
                    portal.camera.updateProjectionMatrix();
                });
            }

            removePortal(portalId) {
                const portal = this.portals.get(portalId);
                if (portal) {
                    portal.renderTarget.dispose();
                    this.portals.delete(portalId);
                }
            }

            clearAll() {
                this.portals.forEach(portal => {
                    portal.renderTarget.dispose();
                });
                this.portals.clear();
            }
        }

        const portalSystem = new PortalSystem(scene, renderer, camera);

        // ============================================================
        // UI
        // ============================================================
        const menuScreen = document.getElementById('menuScreen');
        const playButton = document.getElementById('playButton');
        const crosshair = document.getElementById('crosshair');
        const menuPreview = document.getElementById('menuPreview');

        const previewRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        previewRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        previewRenderer.setSize(260, 150);
        previewRenderer.shadowMap.enabled = false;
        if (menuPreview) menuPreview.appendChild(previewRenderer.domElement);

        const previewCamera = new THREE.PerspectiveCamera(50, 260 / 150, 0.01, 500);

        // ============================================================
        // LIGHTING
        // ============================================================
        const ambient = new THREE.AmbientLight(0x222244, 0.4);
        scene.add(ambient);
        const hemi = new THREE.HemisphereLight(0x4466aa, 0x221133, 0.6);
        scene.add(hemi);

        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        mainLight.position.set(8, 18, 6);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 40;
        mainLight.shadow.camera.left = -15;
        mainLight.shadow.camera.right = 15;
        mainLight.shadow.camera.top = 15;
        mainLight.shadow.camera.bottom = -15;
        mainLight.shadow.bias = -0.001;
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
        fillLight.position.set(-6, -4, -8);
        scene.add(fillLight);

        const accentColors = [0xff4400, 0x00ccff, 0xff66aa, 0x66ff99];
        const accentPositions = [[-8, 4, -8], [8, 4, 8], [-8, 4, 8], [8, 4, -8]];
        accentPositions.forEach((pos, i) => {
            const light = new THREE.PointLight(accentColors[i % accentColors.length], 0.5, 12);
            light.position.set(pos[0], pos[1], pos[2]);
            scene.add(light);
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshBasicMaterial({ color: accentColors[i % accentColors.length] }));
            sphere.position.copy(light.position);
            scene.add(sphere);
        });

        // ============================================================
        // PHYSICS
        // ============================================================
        const physicsWorld = new CANNON.World();
        physicsWorld.gravity.set(0, -20, 0);
        physicsWorld.broadphase = new CANNON.SAPBroadphase(physicsWorld);
        physicsWorld.allowSleep = true;

        const FILTER_DEFAULT = 1;
        const FILTER_WALL = 2;
        const FILTER_CUBE = 4;

        const groundMat = new CANNON.Material('ground');
        const cubeMat = new CANNON.Material('cube');
        physicsWorld.addContactMaterial(new CANNON.ContactMaterial(cubeMat, groundMat, { friction: 0.3, restitution: 0.3 }));

        const floorBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane(), material: groundMat });
        floorBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
        floorBody.collisionFilterGroup = FILTER_DEFAULT;
        floorBody.collisionFilterMask = FILTER_DEFAULT | FILTER_CUBE;
        physicsWorld.addBody(floorBody);

        function addWallBody(x, y, z, w, h, d) {
            const body = new CANNON.Body({ mass: 0 });
            body.addShape(new CANNON.Box(new CANNON.Vec3(w / 2, h / 2, d / 2)));
            body.position.set(x, y, z);
            body.collisionFilterGroup = FILTER_WALL;
            body.collisionFilterMask = FILTER_CUBE;
            physicsWorld.addBody(body);
        }
        const chamberSize = 20, wallHeight = 6;
        addWallBody(0, wallHeight / 2, -chamberSize / 2, chamberSize, wallHeight, 0.4);
        addWallBody(0, wallHeight / 2, chamberSize / 2, chamberSize, wallHeight, 0.4);
        addWallBody(-chamberSize / 2, wallHeight / 2, 0, 0.4, wallHeight, chamberSize);
        addWallBody(chamberSize / 2, wallHeight / 2, 0, 0.4, wallHeight, chamberSize);
        addWallBody(-5, 1.5, -5, 4, 3, 4);
        addWallBody(6, 1.5, 4, 3, 3, 3);
        addWallBody(-7, 1.5, 6, 3, 3, 3);
        addWallBody(8, 1, -6, 2, 2, 2);

        const cubeBody = new CANNON.Body({
            mass: 1,
            type: CANNON.Body.DYNAMIC,
            shape: new CANNON.Box(new CANNON.Vec3(0.55, 0.55, 0.55)), // will be updated when GLB loads
            material: cubeMat,
            position: new CANNON.Vec3(2, 1.0, 2),
            linearDamping: 0.1,
            angularDamping: 0.5
        });
        cubeBody.collisionFilterGroup = FILTER_CUBE;
        cubeBody.collisionFilterMask = FILTER_DEFAULT | FILTER_WALL;
        physicsWorld.addBody(cubeBody);

        // ============================================================
        // ENVIRONMENT (procedural fallback)
        // ============================================================
        const wallColor = 0x1a2233, trimColor = 0x333344;
        const stripeOrange = 0xff6600, stripeBlue = 0x3399ff;

        const proceduralEnvGroup = new THREE.Group();
        scene.add(proceduralEnvGroup);
        proceduralEnvGroup.name = 'proceduralEnv';

        const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a12, roughness: 0.9, metalness: 0.1 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(chamberSize, chamberSize), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.01;
        floor.receiveShadow = true;
        proceduralEnvGroup.add(floor);

        const gridHelper = new THREE.GridHelper(chamberSize, 10, 0x2a2a3a, 0x1a1a2a);
        gridHelper.position.y = 0.01;
        proceduralEnvGroup.add(gridHelper);

        function addWall(x, y, z, w, h, d, color) {
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.1 });
            const box = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            box.position.set(x, y, z);
            box.castShadow = true;
            box.receiveShadow = true;
            proceduralEnvGroup.add(box);
        }
        addWall(0, wallHeight / 2, -chamberSize / 2, chamberSize, wallHeight, 0.4, wallColor);
        addWall(0, wallHeight / 2, chamberSize / 2, chamberSize, wallHeight, 0.4, wallColor);
        addWall(-chamberSize / 2, wallHeight / 2, 0, 0.4, wallHeight, chamberSize, wallColor);
        addWall(chamberSize / 2, wallHeight / 2, 0, 0.4, wallHeight, chamberSize, wallColor);
        addWall(0, 0.25, -chamberSize / 2 + 0.3, chamberSize - 0.8, 0.5, 0.2, trimColor);
        addWall(0, 0.25, chamberSize / 2 - 0.3, chamberSize - 0.8, 0.5, 0.2, trimColor);
        addWall(-chamberSize / 2 + 0.3, 0.25, 0, 0.2, 0.5, chamberSize - 0.8, trimColor);
        addWall(chamberSize / 2 - 0.3, 0.25, 0, 0.2, 0.5, chamberSize - 0.8, trimColor);
        addWall(0, wallHeight - 0.25, -chamberSize / 2 + 0.3, chamberSize - 0.8, 0.5, 0.2, trimColor);
        addWall(0, wallHeight - 0.25, chamberSize / 2 - 0.3, chamberSize - 0.8, 0.5, 0.2, trimColor);
        addWall(-chamberSize / 2 + 0.3, wallHeight - 0.25, 0, 0.2, 0.5, chamberSize - 0.8, trimColor);
        addWall(chamberSize / 2 - 0.3, wallHeight - 0.25, 0, 0.2, 0.5, chamberSize - 0.8, trimColor);
        addWall(-5, 1.5, -5, 4, 3, 4, 0x2a2a3a);
        addWall(6, 1.5, 4, 3, 3, 3, 0x2a2a3a);
        addWall(-7, 1.5, 6, 3, 3, 3, 0x2a2a3a);
        addWall(8, 1, -6, 2, 2, 2, 0x2a2a3a);

        function addStripe(side, color, yPos) {
            const stripeHeight = 0.3, stripeWidth = chamberSize - 1.6;
            const mat = new THREE.MeshBasicMaterial({ color });
            const geom = new THREE.PlaneGeometry(stripeWidth, stripeHeight);
            let mesh;
            if (side === 'front') { mesh = new THREE.Mesh(geom, mat); mesh.position.set(0, yPos, -chamberSize / 2 + 0.3); }

        function integrateAssets() {
            // ---- Environment ----
            if (assets.environment) {
                proceduralEnvGroup.visible = false;
                scene.add(assets.environment);
                console.log('Using auto-scaled GLB environment.');
            } else {
                proceduralEnvGroup.visible = true;
                console.log('Using procedural environment.');
            }

            // ---- Cube ----
            if (assets.cube) {
                proceduralCubeMeshes.forEach(mesh => mesh.visible = false);
                const cubeModel = assets.cube;
                cubeModel.castShadow = true;
                cubeModel.receiveShadow = true;
                grabbableCube.add(cubeModel);

                // Update physics body to match the auto-scaled model
                const halfExtents = getModelHalfExtents(cubeModel);
                if (halfExtents.x > 0.01 && halfExtents.y > 0.01 && halfExtents.z > 0.01) {
                    cubeBody.shapes = [];
                    cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(halfExtents.x, halfExtents.y, halfExtents.z)));
                    console.log(`Cube physics updated to ${halfExtents.x.toFixed(3)}, ${halfExtents.y.toFixed(3)}, ${halfExtents.z.toFixed(3)}`);
                }
                console.log('Using auto-scaled GLB cube.');
            } else {
                proceduralCubeMeshes.forEach(mesh => mesh.visible = true);
                console.log('Using procedural cube.');
            }

            // ---- Gun ----
            if (assets.gun) {
                proceduralGunMeshes.forEach(mesh => {
                    gunGroup.remove(mesh);
                });
                const gunModel = assets.gun;
                gunModel.position.set(0, 0, 0);
                gunGroup.add(gunModel);
                console.log('Using auto-scaled GLB gun.');
            } else {
                proceduralGunMeshes.forEach(mesh => {
                    if (!gunGroup.children.includes(mesh)) gunGroup.add(mesh);
                });
                console.log('Using procedural gun.');
            }
        }

        const PORTAL_RADIUS = 0.9;

        const portals = { orange: null, blue: null };

        function createPortalVisual(colorHex, normal) {
            const group = new THREE.Group();
            const scaleX = 1.0, scaleY = PORTAL_HEIGHT_SCALE, radius = PORTAL_RADIUS;
            
            const outerMat = new THREE.MeshStandardMaterial({
                color: colorHex,

                color: colorHex,
                transparent: true,
                opacity: 0.3,
                side: THREE.DoubleSide
            });
            const innerGeom = new THREE.CircleGeometry(radius - 0.1, 32);
            innerGeom.scale(scaleX, scaleY, 1);
            group.add(new THREE.Mesh(innerGeom, innerMat));
            
            const glowMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const glowGeom = new THREE.TorusGeometry(radius - 0.15, 0.04, 8, 24);
            glowGeom.scale(scaleX, scaleY, 1);
            group.add(new THREE.Mesh(glowGeom, glowMat));
            
            const outerGlowMat = new THREE.MeshBasicMaterial({
                color: colorHex,
                transparent: true,
                opacity: 0.5
            });
            const outerGlowGeom = new THREE.TorusGeometry(radius + 0.1, 0.03, 16, 32);
            outerGlowGeom.scale(scaleX, scaleY, 1);
            group.add(new THREE.Mesh(outerGlowGeom, outerGlowMat));
            
            const light = new THREE.PointLight(colorHex, 1.5, 5);
            light.position.set(0, 0, 0.2);
            group.add(light);
            
            const screenMat = new THREE.MeshBasicMaterial({
                side: THREE.DoubleSide,
                transparent: false,
                color: 0xffffff
            });
            const screenGeom = new THREE.CircleGeometry(radius, 32);
            screenGeom.scale(scaleX, scaleY, 1);
            const screenMesh = new THREE.Mesh(screenGeom, screenMat);
            screenMesh.position.set(0, 0, 0.05);
            screenMesh.renderOrder = -1;
            group.add(screenMesh);
            
            const zAxis = normal.clone().normalize();
            const upVec = new THREE.Vector3(0, 1, 0);
            const rightVec = new THREE.Vector3().crossVectors(upVec, zAxis).normalize();
            if (rightVec.length() < 0.01) {
                const quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 0, 1), zAxis);
                group.quaternion.copy(quat);
            } else {
                const yAxis = new THREE.Vector3().crossVectors(zAxis, rightVec).normalize();
                const m = new THREE.Matrix4().makeBasis(rightVec, yAxis, zAxis);
                group.quaternion.setFromRotationMatrix(m);
            }
            return { group, screenMesh };
        }

        function createPortalEffect(position, color) {
            const particles = [];
            for (let i = 0; i < 20; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.05, 4, 4), new THREE.MeshBasicMaterial({ color }));
                p.position.copy(position);
                p.velocity = new THREE.Vector3((Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4);
                p.life = 0.5 + Math.random() * 0.5;
                p.age = 0;
                scene.add(p);
                particles.push(p);
            }
            const animate = () => {
                let alive = false;
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.age += 0.016;
                    if (p.age >= p.life) {
                        scene.remove(p);
                        particles.splice(i, 1);
                    } else {
                        p.position.add(p.velocity.clone().multiplyScalar(0.016));
                        p.material.opacity = 1 - p.age / p.life;
                        p.material.transparent = true;
                        p.scale.multiplyScalar(0.98);
                        alive = true;
                    }
                }
                if (alive) requestAnimationFrame(animate);
            };
            animate();
        }

        function placePortal(type, position, normal) {
            if (portals[type]) {
                scene.remove(portals[type].group);
                portals[type] = null;
                portalSystem.removePortal(type);
            }
            const color = type === 'orange' ? 0xff6600 : 0x3399ff;
            const { group, screenMesh } = createPortalVisual(color, normal);
            group.position.copy(position);
            scene.add(group);
            group.updateMatrixWorld(true);
            portalStates[type] = { canTrigger: true, lastTriggerPos: null };
            createPortalEffect(position, color);
            portals[type] = {
                group,
                screenMesh,
                position: position.clone(),
                normal: normal.clone().normalize(),
                type,
                color
            };
            
            portalSystem.createOrUpdatePortal(type, position, normal, color);
            
            const otherType = type === 'orange' ? 'blue' : 'orange';
            if (portals[otherType]) {
                portalSystem.linkPortals(type, otherType);
                portalSystem.createOrUpdatePortal(otherType, portals[otherType].position, portals[otherType].normal, portals[otherType].color);
            }
            
            updateGunColor(type);
        }

        function updatePortalVisualState(type, canTrigger) {
            const portal = portals[type];
            if (!portal) return;
            portal.group.children.forEach(c => {
                if (c.material?.emissive) c.material.emissive = new THREE.Color(portal.color).multiplyScalar(canTrigger ? 0.7 : 0.2);
                if (c instanceof THREE.PointLight) c.intensity = canTrigger ? 1.5 : 0.3;
            });
        }

        function updateGunColor(type) {
            const hex = type === 'orange' ? 0xff6600 : 0x3399ff;
            if (core.material) {
                core.material.color.setHex(hex);
                core.material.emissive.setHex(hex);
            }
            if (glow.material) {
                glow.material.color.setHex(hex);
            }
            if (coreLight) {
                coreLight.color.setHex(hex);
            }
        }

        function teleportEntity(entity, fromPortal, toPortal) {
            if (!fromPortal || !toPortal || !portalStates[fromPortal.type].canTrigger) return false;
            
            const fromType = fromPortal.type;
            portalStates[fromType].canTrigger = false;
            portalStates[fromType].lastTriggerPos = entity.position.clone();
            updatePortalVisualState(fromType, false);
            
            const toType = toPortal.type;
            portalStates[toType].canTrigger = false;
            portalStates[toType].lastTriggerPos = null;
            updatePortalVisualState(toType, false);
            
            document.getElementById('teleportFlash').style.backgroundColor = fromType === 'orange' ? 'rgba(255,102,0,0.4)' : 'rgba(51,153,255,0.4)';
            setTimeout(() => document.getElementById('teleportFlash').style.backgroundColor = 'transparent', 150);
            createPortalEffect(fromPortal.position, fromPortal.color);

            const fromQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 0, 1), fromPortal.normal);
            const toQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 0, 1), toPortal.normal);
            
            const isCube = (entity === grabbableCube);
            const entityPos = entity.position.clone();
            
            const relative = entityPos.sub(fromPortal.position);
            const fromLocal = relative.clone().applyQuaternion(fromQuat.clone().invert());
            
            fromLocal.x = -fromLocal.x;
            fromLocal.z = -fromLocal.z;
            
            const newPos = toPortal.position.clone().add(fromLocal.applyQuaternion(toQuat));
            const finalPos = newPos.add(toPortal.normal.clone().multiplyScalar(isCube ? 0.75 : 0.8));
            
            if (isCube) {
                cubeBody.position.set(finalPos.x, finalPos.y, finalPos.z);
                
                const currentVel = new THREE.Vector3(cubeBody.velocity.x, cubeBody.velocity.y, cubeBody.velocity.z);
                const localVel = currentVel.applyQuaternion(fromQuat.clone().invert());
                localVel.x = -localVel.x;
                localVel.z = -localVel.z;
                const newVel = localVel.applyQuaternion(toQuat);
                cubeBody.velocity.set(newVel.x, newVel.y, newVel.z);
                
                const currentQuat = new THREE.Quaternion(cubeBody.quaternion.x, cubeBody.quaternion.y, cubeBody.quaternion.z, cubeBody.quaternion.w);
                const flipQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI);
                const transformQuat = toQuat.clone().multiply(flipQuat).multiply(fromQuat.clone().invert());
                const newQuat = transformQuat.multiply(currentQuat);
                cubeBody.quaternion.set(newQuat.x, newQuat.y, newQuat.z, newQuat.w);

                entity.position.copy(finalPos);
                entity.quaternion.copy(newQuat);
            } else {
                entity.position.copy(finalPos);
            }
            
            portalStates[toType].lastTriggerPos = entity.position.clone();
            createPortalEffect(toPortal.position, toPortal.color);

            if (entity === camera) {
                const forward = toPortal.normal.clone();
                const yaw = Math.atan2(-forward.x, -forward.z);
                const pitch = Math.asin(Math.max(-1, Math.min(1, forward.y)));
                controls.yaw = yaw;
                controls.pitch = pitch;
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                camera.up.set(0, 1, 0);
            }
            return true;
        }

        function checkPortalReset() {
            for (const t of ['orange', 'blue']) {
                if (!portalStates[t].canTrigger && portals[t]) {
                    const dCam = camera.position.distanceTo(portals[t].position);
                    const dCube = grabbableCube.position.distanceTo(portals[t].position);
                    if (dCam > PORTAL_RADIUS * 1.5 && dCube > PORTAL_RADIUS * 1.5) {
                        portalStates[t].canTrigger = true;
                        portalStates[t].lastTriggerPos = null;
                        updatePortalVisualState(t, true);
                    }
                }
            }
        }

        function checkPortalTeleport(entity) {
            const isCube = (entity === grabbableCube);
            for (const t of ['orange', 'blue']) {
                const portal = portals[t];
                if (!portal || !portalStates[t].canTrigger) continue;
                
                const entityPos = entity.position.clone();
                const dist = entityPos.distanceTo(portal.position);
                const triggerDist = isCube ? 0.85 : PORTAL_TRIGGER_DISTANCE;
                
                if (dist < triggerDist) {
                    const other = portals[t === 'orange' ? 'blue' : 'orange'];
                    if (other && portalStates[t === 'orange' ? 'blue' : 'orange'].canTrigger) {
                        const toEntity = entityPos.sub(portal.position);
                        const dot = toEntity.dot(portal.normal);
                        if (dot < 0.25) {
                            return teleportEntity(entity, portal, other);
                        }
                    }
                }
            }
            return false;
        }

        function clearAllPortals() {
            if (portals.orange) { scene.remove(portals.orange.group); portals.orange = null; }
            if (portals.blue) { scene.remove(portals.blue.group); portals.blue = null; }
            portalStates.orange.canTrigger = true;
            portalStates.orange.lastTriggerPos = null;
            portalStates.blue.canTrigger = true;
            portalStates.blue.lastTriggerPos = null;
            portalSystem.clearAll();
            triggerClearAnimation();
        }

        const controls = new PointerLockControls(camera, renderer.domElement);
        const move = { forward: false, backward: false, left: false, right: false, jump: false, sprint: false, crouch: false };
        const vel = new THREE.Vector3();
        let isGrounded = true, targetHeight = 1.8, curHeight = 1.8;

        const collisionObjects = [];
        scene.children.forEach(child => {
            if (child.isMesh && child.geometry.type === 'BoxGeometry') {
                if (child.material.color && (child.material.color.getHex() === wallColor || child.material.color.getHex() === 0x2a2a3a)) {
                    collisionObjects.push(child);
                }
            }
        });

        function resolveCollision(entityPos, radius, velocity) {
            for (const obj of collisionObjects) {
                const box = new THREE.Box3().setFromObject(obj);
                const closest = new THREE.Vector3();
                box.clampPoint(entityPos, closest);
                const diff = entityPos.clone().sub(closest);
                const dist = diff.length();
                if (dist < radius && dist > 0.001) {
                    const overlap = radius - dist;
                    const dir = diff.clone().normalize();
                    entityPos.add(dir.clone().multiplyScalar(overlap));
                    const velDot = velocity.dot(dir);
                    if (velDot < 0) velocity.add(dir.clone().multiplyScalar(-velDot * 0.5));
                }
            }
        }

        document.addEventListener('keydown', e => {
            if (!controls.isLocked) return;
            switch (e.code) {
                case 'KeyW': move.forward = true; break;
                case 'KeyS': move.backward = true; break;
                case 'KeyA': move.left = true; break;
                case 'KeyD': move.right = true; break;
                case 'Space': move.jump = true; break;
                case 'KeyR': clearAllPortals(); break;
                case 'KeyE': tryGrab(); break;
                case 'ShiftLeft': move.sprint = true; break;
                case 'ControlLeft': move.crouch = true; break;
            }
            e.preventDefault();
        });
        document.addEventListener('keyup', e => {
            switch (e.code) {
                case 'KeyW': move.forward = false; break;
                case 'KeyS': move.backward = false; break;
                case 'KeyA': move.left = false; break;
                case 'KeyD': move.right = false; break;
                case 'Space': move.jump = false; break;
                case 'ShiftLeft': move.sprint = false; break;
                case 'ControlLeft': move.crouch = false; break;
            }
            e.preventDefault();
        });

        document.addEventListener('mousedown', e => {
            if (!controls.isLocked) return;
            const rc = new THREE.Raycaster();
            rc.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = rc.intersectObjects(scene.children.filter(c => c.isMesh && !(c.parent && (portals.orange?.group === c.parent || portals.blue?.group === c.parent))));
            if (hits.length) {
                const pt = hits[0].point;
                let norm = hits[0].face.normal.clone().applyQuaternion(hits[0].object.quaternion).normalize();
                if (norm.dot(pt.clone().sub(camera.position)) > 0) norm.negate();
                const upVec = new THREE.Vector3(0, 1, 0);
                const rightVec = new THREE.Vector3().crossVectors(upVec, norm).normalize();
                let shouldPlace = true;
                if (rightVec.length() < 0.01) {
                    if (norm.y > 0 && pt.y < 0.5) shouldPlace = false;
                } else {
                    const yAxis = new THREE.Vector3().crossVectors(norm, rightVec).normalize();
                    if (pt.y - Math.abs(yAxis.y) * PORTAL_HEIGHT_SCALE < 0) shouldPlace = false;
                }
                if (!shouldPlace) return;
                const pos = pt.clone().add(norm.clone().multiplyScalar(0.15));
                if (e.button === 0) { placePortal('orange', pos, norm); firePortalGun('orange', pt); }
                else if (e.button === 2) { placePortal('blue', pos, norm); firePortalGun('blue', pt); }
            }
        });
        document.addEventListener('contextmenu', e => e.preventDefault());
        renderer.domElement.addEventListener('click', () => controls.lock());

        let heldObject = null;
        const holdDistance = 2.0;
        let targetGunX = 0.35, targetGunY = -0.25, targetGunZ = -0.8;
        let targetGunRotX = 0, targetGunRotY = 0, targetGunRotZ = 0;
        let swayTimer = 0;

        function tryGrab() {
            if (heldObject) {
                const camDir = new THREE.Vector3();
                camera.getWorldDirection(camDir);
                const dropVel = camDir.clone().multiplyScalar(12);
                cubeBody.type = CANNON.Body.DYNAMIC;
                cubeBody.velocity.set(dropVel.x, dropVel.y + 2, dropVel.z);
                cubeBody.wakeUp();
                outline.visible = false;
                glowSphere.visible = false;
                cubeGlowLight.intensity = 0.0;
                targetGunX = 0.35;
                targetGunY = -0.25;
                targetGunZ = -0.8;
                targetGunRotX = 0;
                targetGunRotY = 0;
                targetGunRotZ = 0;
                coreLight.intensity = 3;
                heldObject = null;
                grabRecoil = -0.08;
                return;
            }
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = raycaster.intersectObjects(grabbableCube.children, true);
            if (hits.length > 0 && hits[0].distance < 3.0) {
                heldObject = grabbableCube;
                cubeBody.type = CANNON.Body.KINEMATIC;
                cubeBody.velocity.set(0, 0, 0);
                cubeBody.angularVelocity.set(0, 0, 0);
                outline.visible = true;
                glowSphere.visible = true;
                cubeGlowLight.intensity = 0.8;
                targetGunX = 0.45;
                targetGunY = -0.3;
                targetGunZ = -0.7;
                targetGunRotX = 0.45;
                targetGunRotY = 0.15;
                targetGunRotZ = 0.15;
                coreLight.intensity = 6;
                grabRecoil = 0.12;
            }
        }

        function updateCubePhysics(dt) {
            if (heldObject) {
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                const targetPos = camera.position.clone().add(dir.clone().multiplyScalar(holdDistance));
                targetPos.y -= 0.2;
                grabbableCube.position.lerp(targetPos, 0.8);
                cubeBody.position.set(grabbableCube.position.x, grabbableCube.position.y, grabbableCube.position.z);
                cubeBody.quaternion.set(grabbableCube.quaternion.x, grabbableCube.quaternion.y, grabbableCube.quaternion.z, grabbableCube.quaternion.w);
            } else {
                grabbableCube.position.copy(cubeBody.position);
                grabbableCube.quaternion.copy(cubeBody.quaternion);
            }
        }

        let recoil = 0, recoilRotX = 0, grabRecoil = 0, idleTimer = 0, activeBeam = null, corePulse = 0;
        let clearAnimActive = false, clearAnimTime = 0;
        const CLEAR_ANIM_DURATION = 0.8;

        function triggerClearAnimation() {
            if (clearAnimActive) return;
            clearAnimActive = true;
            clearAnimTime = 0;
            muzzleFlash.intensity = 3.5;
            setTimeout(() => muzzleFlash.intensity = 0, 150);
        }

        function firePortalGun(type, hitPoint) {
            recoil = 0.15;
            recoilRotX = -0.06;
            muzzleFlash.intensity = 3;
            setTimeout(() => muzzleFlash.intensity = 0, 60);
            corePulse = 1.5;
            if (activeBeam) scene.remove(activeBeam);
            let muzzleWorldPos;
            if (assets.gun) {
                const muzzleNode = assets.gun.getObjectByName('muzzle') || assets.gun.getObjectByName('Muzzle');
                if (muzzleNode) {
                    muzzleWorldPos = new THREE.Vector3();
                    muzzleNode.getWorldPosition(muzzleWorldPos);
                } else {
                    muzzleWorldPos = gunGroup.position.clone();
                    camera.getWorldPosition(muzzleWorldPos);
                    const dir = new THREE.Vector3();
                    camera.getWorldDirection(dir);
                    muzzleWorldPos.add(dir.multiplyScalar(1.5));
                }
            } else {
                if (muzzle) {
                    muzzleWorldPos = new THREE.Vector3();
                    muzzle.getWorldPosition(muzzleWorldPos);
                } else {
                    muzzleWorldPos = gunGroup.position.clone();
                    camera.getWorldPosition(muzzleWorldPos);
                    const dir = new THREE.Vector3();
                    camera.getWorldDirection(dir);
                    muzzleWorldPos.add(dir.multiplyScalar(1.5));
                }
            }
            const beam = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([muzzleWorldPos, hitPoint]),
                new THREE.LineBasicMaterial({ color: type === 'orange' ? 0xff6600 : 0x3399ff })
            );
            scene.add(beam);
            activeBeam = beam;
            setTimeout(() => { if (activeBeam === beam) { scene.remove(beam); activeBeam = null; } }, 150);
        }

        // ============================================================
        // RENDER LOOP
        // ============================================================
        const clock = new THREE.Clock();

        function renderMenuPreview() {
            previewCamera.position.set(7, 5, 7);
            previewCamera.lookAt(0, 1.5, 0);
            previewRenderer.render(scene, previewCamera);
            requestAnimationFrame(renderMenuPreview);
        }
        renderMenuPreview();

        function startGame() {
            menuScreen.style.display = 'none';
            crosshair.style.display = 'block';
            controls.lock();
        }

        playButton.addEventListener('click', startGame);

        function animate() {
            const dt = Math.min(clock.getDelta(), 0.1);

            if (controls.isLocked) {
                const spd = move.sprint ? 10 : 6;
                targetHeight = move.crouch ? 1.0 : 1.8;
                curHeight += (targetHeight - curHeight) * Math.min(8 * dt, 1);
                const fwd = new THREE.Vector3();
                camera.getWorldDirection(fwd);
                fwd.y = 0;
                fwd.normalize();
                const right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0, 1, 0)).normalize();
                const des = new THREE.Vector3(0, vel.y, 0);
                if (move.forward) des.add(fwd.clone().multiplyScalar(spd));
                if (move.backward) des.add(fwd.clone().multiplyScalar(-spd * 0.7));
                if (move.right) des.add(right.clone().multiplyScalar(spd * 0.8));
                if (move.left) des.add(right.clone().multiplyScalar(-spd * 0.8));
                const acc = isGrounded ? 20 : 6, dec = isGrounded ? 15 : 4.5;
                const hDes = Math.sqrt(des.x * des.x + des.z * des.z);
                if (hDes > 0.1) {
                    vel.x += (des.x - vel.x) * Math.min(acc * dt, 1);
                    vel.z += (des.z - vel.z) * Math.min(acc * dt, 1);
                } else {
                    vel.x *= (1 - Math.min(dec * dt, 1));
                    vel.z *= (1 - Math.min(dec * dt, 1));
                }
                vel.y -= 20 * dt;
                if (move.jump && isGrounded) vel.y = 8;
                camera.position.x += vel.x * dt;
                camera.position.z += vel.z * dt;
                camera.position.y += vel.y * dt;
                if (camera.position.y <= curHeight) {
                    camera.position.y = curHeight;
                    vel.y = 0;
                    isGrounded = true;
                } else isGrounded = false;
                resolveCollision(camera.position, 0.35, vel);
            }

            let nearPortal = false;
            if (portals.orange && portals.blue) {
                const cubePos = new THREE.Vector3(cubeBody.position.x, cubeBody.position.y, cubeBody.position.z);
                for (const t of ['orange', 'blue']) {
                    if (cubePos.distanceTo(portals[t].position) < 1.6) {
                        nearPortal = true;
                        break;
                    }
                }
            }
            if (nearPortal) {
                cubeBody.collisionFilterMask = FILTER_DEFAULT;
            } else {
                cubeBody.collisionFilterMask = FILTER_DEFAULT | FILTER_WALL;
            }

            physicsWorld.step(1 / 60, dt, 3);
            updateCubePhysics(dt);

            if (controls.isLocked) {
                checkPortalReset();
                checkPortalTeleport(camera);
                if (heldObject) checkPortalTeleport(heldObject);
                else checkPortalTeleport(grabbableCube);
            }

            const hDes = Math.sqrt(vel.x * vel.x + vel.z * vel.z);
            const isMoving = hDes > 0.1 && isGrounded;
            let swayX = 0, swayY = 0, swayRotZ = 0, swayRotX = 0;
            let idleBreathY = 0, idleBreathRotX = 0, idleBreathRotZ = 0;

            if (isMoving) {
                swayTimer += dt * 8.0;
                const swayIntensity = move.sprint ? 1.8 : 1.0;
                swayX = Math.sin(swayTimer) * 0.035 * swayIntensity;
                swayY = Math.cos(swayTimer * 2) * 0.015 * swayIntensity;
                swayRotZ = Math.sin(swayTimer) * 0.025 * swayIntensity;
                swayRotX = Math.sin(swayTimer * 2) * 0.01 * swayIntensity;
                idleTimer = 0;
            } else {
                swayTimer = 0;
                if (!heldObject && !clearAnimActive) {
                    idleTimer += dt;
                    idleBreathY = Math.sin(idleTimer * 1.2) * 0.008;
                    idleBreathRotZ = Math.sin(idleTimer * 1.5) * 0.005;
                    idleBreathRotX = Math.sin(idleTimer * 1.0) * 0.005;
                }
            }

            let baseTargetGunX = (heldObject ? 0.45 : 0.35) + swayX + (move.sprint ? 0.02 : 0);
            let baseTargetGunY = (heldObject ? -0.3 : -0.25) + (move.crouch ? -0.15 : 0) + swayY + idleBreathY;
            let baseTargetGunZ = (heldObject ? -0.7 : -0.8);
            let baseTargetGunRotX = (heldObject ? 0.45 : 0) + swayRotX + idleBreathRotX;
            let baseTargetGunRotY = (heldObject ? 0.15 : 0);
            let baseTargetGunRotZ = (heldObject ? 0.15 : 0) + swayRotZ + idleBreathRotZ;

            if (clearAnimActive) {
                clearAnimTime += dt;
                const progress = Math.min(clearAnimTime / CLEAR_ANIM_DURATION, 1);
                const numSwings = 3.5;
                const amplitude = 0.25 * (1 - progress * 0.9);
                const osc = Math.sin(progress * numSwings * Math.PI * 2) * amplitude;
                const pitchUp = -0.2 * (1 - progress);
                baseTargetGunRotY = osc;
                baseTargetGunRotX = pitchUp;
                baseTargetGunX += Math.sin(progress * numSwings * Math.PI * 2 + 0.3) * amplitude * 0.1;

                if (progress >= 1) {
                    clearAnimActive = false;
                    clearAnimTime = 0;
                    baseTargetGunRotY = (heldObject ? 0.15 : 0);
                    baseTargetGunRotX = (heldObject ? 0.45 : 0);
                    baseTargetGunX = (heldObject ? 0.45 : 0.35);
                    baseTargetGunY = (heldObject ? -0.3 : -0.25) + (move.crouch ? -0.15 : 0);
                }
            }

            targetGunX = baseTargetGunX;
            targetGunY = baseTargetGunY;
            targetGunZ = baseTargetGunZ;
            targetGunRotX = baseTargetGunRotX;
            targetGunRotY = baseTargetGunRotY;
            targetGunRotZ = baseTargetGunRotZ;

            corePulse += dt * 2.0;
            if (!heldObject && coreLight) coreLight.intensity = 3.0 + Math.sin(corePulse) * 0.5;

            gunGroup.position.x += (targetGunX - gunGroup.position.x) * Math.min(12 * dt, 1);
            gunGroup.position.y += (targetGunY - gunGroup.position.y) * Math.min(12 * dt, 1);
            gunGroup.position.z += (targetGunZ - gunGroup.position.z) * Math.min(12 * dt, 1);
            gunGroup.rotation.x += (targetGunRotX - gunGroup.rotation.x) * Math.min(12 * dt, 1);
            gunGroup.rotation.y += (targetGunRotY - gunGroup.rotation.y) * Math.min(12 * dt, 1);
            gunGroup.rotation.z += (targetGunRotZ - gunGroup.rotation.z) * Math.min(12 * dt, 1);

            if (recoil > 0.001) recoil *= Math.exp(-15 * dt); else recoil = 0;
            if (Math.abs(recoilRotX) > 0.0001) recoilRotX *= Math.exp(-20 * dt); else recoilRotX = 0;
            if (Math.abs(grabRecoil) > 0.001) grabRecoil *= Math.exp(-10 * dt); else grabRecoil = 0;
            gunGroup.position.z += (recoil + grabRecoil);
            gunGroup.rotation.x += recoilRotX;

            if (portals.orange && portals.blue) {
                portalSystem.renderAllPortals();
                
                if (portals.orange.screenMesh) {
                    const orangeTex = portalSystem.getPortalTexture('orange');
                    if (orangeTex) {
                        portals.orange.screenMesh.material.map = orangeTex;
                        portals.orange.screenMesh.material.color.set(0xffffff);
                        portals.orange.screenMesh.material.needsUpdate = true;
                    }
                }
                if (portals.blue.screenMesh) {
                    const blueTex = portalSystem.getPortalTexture('blue');
                    if (blueTex) {
                        portals.blue.screenMesh.material.map = blueTex;
                        portals.blue.screenMesh.material.color.set(0xffffff);
                        portals.blue.screenMesh.material.needsUpdate = true;
                    }
                }
            }

            composer.render();
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            previewRenderer.setSize(260, 150);
            previewCamera.aspect = 260 / 150;
            previewCamera.updateProjectionMatrix();
            portalSystem.updateSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
